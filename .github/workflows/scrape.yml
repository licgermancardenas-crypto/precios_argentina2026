name: scrape-diario

on:
  schedule:
    - cron: "0 9 * * *"   # 06:00 Argentina (UTC-3)
  workflow_dispatch:        # permite correrlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr scraper
        run: python -m scraper.coto

      - name: Normalizar datos
        run: python -m pipeline.normalize

      - name: Commitear datos
        run: |
          git config user.name  "atlas-bot"
          git config user.email "bot@atlas-precios"
          git add data/
          git commit -m "datos $(date +%F)" || echo "sin cambios"
          git push
